<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports 803 - Cricfy TV Live</title>
    <style>
        body { background-color: #090d16; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        header { margin-bottom: 30px; padding: 20px 0; border-bottom: 2px solid #00ffcc; }
        header h1 { color: #00ffcc; margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        header p { color: #8a99ad; margin: 5px 0 0 0; font-size: 14px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 600px; margin: 0 auto; padding: 10px; }
        .channel-card { text-decoration: none; color: white; background: #131c2e; border: 1px solid #223250; border-radius: 12px; padding: 20px 10px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s; }
        .channel-card:active { transform: scale(0.95); }
        .channel-card .icon { font-size: 45px; margin-bottom: 10px; }
        .channel-card .name { font-weight: bold; font-size: 15px; text-transform: uppercase; }
        .badge { background: #ff3b30; color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: bold; margin-top: 8px; }
        .badge.off { background: #475569; }
        footer { margin-top: 40px; color: #475569; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>SPORTS 803 TV</h1>
        <p>⚡ Cricfy TV Interface ⚡</p>
    </header>

    <div class="grid-container">
        <!-- Channel 1 -->
        <a href="https://sportsurge.net" target="_blank" class="channel-card">
            <div class="icon"> 🏏 </div>
            <div class="name">PTV Sports</div>
            <span class="badge">LIVE</span>
        </a>
        <!-- Channel 2 -->
        <a href="https://sportsurge.net" target="_blank" class="channel-card">
            <div class="icon"> ⚽ </div>
            <div class="name">Sky Sports</div>
            <span class="badge">LIVE</span>
        </a>
        <!-- Channel 3 -->
        <a href="https://sportsurge.net" target="_blank" class="channel-card">
            <div class="icon"> 📺 </div>
            <div class="name">Ten Sports</div>
            <span class="badge off">OFFLINE</span>
        </a>
    </div>

    <footer>
        <p>© 2026 Sports 803 Streaming System</p>
    </footer>

</body>
</html>
