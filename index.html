<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTS 803 TV</title>
    <style>
        body { background-color: #0b0f19; color: white; font-family: sans-serif; margin: 0; }
        .video-container { width: 100%; height: 300px; }
        iframe { width: 100%; height: 100%; }
        .quality-controls { padding: 20px; text-align: center; }
        button { background: #00b4d8; border: none; padding: 10px 20px; color: white; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <div class="video-container">
        <iframe id="myPlayer" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen="true"></iframe>
    </div>
    <div class="quality-controls">
        <button onclick="document.getElementById('myPlayer').src='LINK_HD_HANO'">HD Quality</button>
        <button onclick="document.getElementById('myPlayer').src='LINK_SD_HANO'">SD Quality</button>
    </div>
</body>
</html>
