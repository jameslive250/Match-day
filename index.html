<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTS 803 TV</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .header { border-bottom: 2px solid #00b4d8; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #00f5d4; margin: 10px 0 5px 0; }
        .section-title { color: #ffb703; font-size: 18px; margin: 20px 0 10px 0; text-transform: uppercase; }
        /* Iyi niyo iframe nshya */
        .live-score-wrapper { max-width: 600px; margin: 0 auto 25px auto; border: 2px solid #ffb703; border-radius: 12px; overflow: hidden; background-color: #ffffff; }
        .live-score-wrapper iframe { width: 100%; height: 500px; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; max-width: 600px; margin: 0 auto; }
        .card { background-color: #1a2238; border: 2px solid #2e3d61; border-radius: 12px; padding: 15px; text-decoration: none; color: white; }
        .status { font-size: 10px; padding: 2px 6px; border-radius: 8px; background: #2a9d8f; }
    </style>
</head>
<body>
    <div class="header"><h1>SPORTS 803 TV</h1></div>
    <div class="section-title">📅 Today's Live Matches</div>
    <div class="live-score-wrapper">
        <iframe src="https://www.flashscore.com/" width="100%" height="500"></iframe>
    </div>
    <div class="section-title">📺 Channels</div>
    <div class="grid">
        <a href="https://v2.sportsurge.net" target="_blank" class="card"><div class="name">PTV SPORTS</div><span class="status">LIVE</span></a>
        <a href="https://v2.sportsurge.net" target="_blank" class="card"><div class="name">SKY SPORTS</div><span class="status">LIVE</span></a>
    </div>
</body>
</html>
