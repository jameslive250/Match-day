<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0b0f19; color: white; font-family: sans-serif; padding: 20px; }
        .match-card { background: #1a2238; padding: 20px; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid #00b4d8; }
        .modal { display: none; position: fixed; top: 10%; left: 10%; width: 80%; background: #000; padding: 20px; border: 2px solid #00b4d8; border-radius: 10px; }
        button { background: #00b4d8; color: white; border: none; padding: 12px; width: 100%; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SPORTS 803 TV - LIVE</h1>
    <div id="match-container">
        <div class="match-card">
            <h2>Argentina vs Cabo Verde</h2>
            <button onclick="showLinks()">Watch HD</button>
        </div>
    </div>

    <div id="linkModal" class="modal">
        <h3>Multiple Links Available</h3>
        <button onclick="window.location.href='https://link-ya-tsn.com'">TSN SPORTS FHD</button>
        <button onclick="window.location.href='https://link-ya-spotv.com'">SPOTV FHD</button>
        <button onclick="document.getElementById('linkModal').style.display='none'">Close</button>
    </div>

    <script>
        function showLinks() {
            document.getElementById('linkModal').style.display = 'block';
        }
    </script>
</body>
</html>
